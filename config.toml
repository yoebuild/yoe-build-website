base_url = "https://yoebuild.org"
title = "[yoe]"
description = "An exploration of a different approach to embedded Linux builds — native builds, language-native package managers, AI as a first-class interface. A set of experiments in progress, not a finished product."
default_language = "en"
compile_sass = true
build_search_index = false
generate_feeds = true
feed_filenames = ["atom.xml"]

taxonomies = [
  { name = "tags", feed = true },
]

[markdown]
smart_punctuation = true
external_links_target_blank = true
external_links_no_referrer = true

[markdown.highlighting]
theme = "catppuccin-mocha"

[extra]
author = "Yoe"
github_url = "https://github.com/yoebuild/yoe"
discussions_url = "https://github.com/orgs/yoebuild/discussions"
yoedistro_url = "https://yoedistro.org/"
copyright_year = "2026"
